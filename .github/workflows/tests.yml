name: Heritage Press Tests

on:
  schedule:
    - cron: '0 2 * * *'  # Runs at 2 AM UTC daily
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [7.4, 8.0, 8.1, 8.2, 8.4]
      fail-fast: false

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, zip, mbstring, intl, pdo, mysql
          coverage: xdebug
          tools: composer:v2, phpunit:9.6

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          composer install --prefer-dist --no-progress
          composer dump-autoload --optimize

      - name: Run PHP lint
        run: find . -type f -name ''*.php'' -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

      - name: Run test suite
        run: |
          vendor/bin/phpunit --coverage-clover=coverage.xml --coverage-text --testdox
          if [ $? -ne 0 ]; then
            echo "::error::Tests failed!"
            exit 1
          fi

      - name: Upload coverage reports to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-heritage-press
          fail_ci_if_error: false
          use_oidc: true

      - name: Store test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.php-version }}
          path: |
            ./coverage.xml
            ./tests/_output
          retention-days: 14
